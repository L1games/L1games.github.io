<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIFA 94 Local - Fullscreen</title>
    
    <link rel="stylesheet" href="./js-dos.css">
    <script src="./js-dos.js"></script>

    <style>
        /* Reset para pantalla completa */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        #jsdos-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        /* Mantiene los píxeles nítidos (estilo retro) */
        canvas {
            image-rendering: pixelated;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div id="jsdos-container"></div>

    <script>
        // Importante: Asegúrate de que tu js-dos.js sea la versión 8 
        // para que 'createDos' funcione correctamente.
        const container = document.getElementById("jsdos-container");

        createDos(container, {
            style: "none", // Quita bordes y botones extra para máxima inmersión
        }).then((runtime) => {
            // Cargamos tu bundle de FIFA 94
            return runtime.run("./fifa94.jsdos");
        }).catch((err) => {
            console.error("Hubo un problema al cargar el juego:", err);
            // Si ves este error en la consola, intenta renombrar fifa94.jsdos a fifa94.zip
        });
    </script>

</body>
</html>
