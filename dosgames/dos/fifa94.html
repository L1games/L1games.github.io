<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FIFA 94 Retro - Fullscreen</title>

    <link rel="stylesheet" href="js-dos.css">
    <script src="js-dos.js"></script>

    <style>
        /* Pantalla completa total sin márgenes */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }

        #app {
            width: 100vw;
            height: 100vh;
        }

        /* Mejora la nitidez de los píxeles del FIFA */
        canvas {
            image-rendering: pixelated;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div id="app"></div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            // Inicializamos el emulador usando la función 'Dos' (v7)
            // Asegúrate de que el ID coincida con el div de arriba ("app")
            const props = Dos(document.getElementById("app"), {
                
                // RUTA DEL JUEGO: 
                // Si el archivo está en la misma carpeta que este HTML, solo pon el nombre.
                // IMPORTANTE: Revisa si en GitHub es .jsdos o .zip y escríbelo igual.
                url: "fifa94.zip", 

                autoStart: true, // El juego inicia solo
                
                // RUTA DEL MOTOR: 
                // Al estar en GitHub raíz, el pathPrefix debe ser "./" 
                // para que encuentre los archivos .wasm que necesita js-dos.
                pathPrefix: "./",

                onEvent: (event, ci) => {
                    console.log("Evento js-dos:", event);
                    
                    if (event === "ci-ready") {
                        window.ci = ci;
                        // Forzar pantalla completa al estar listo
                        if (typeof props.setFullScreen === "function") {
                            props.setFullScreen(true);
                        }
                    }
                }
            });

            window.props = props;
        });
    </script>
</body>
</html>
