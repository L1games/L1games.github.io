<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Juego DOS</title>

    <link rel="stylesheet" href="./js-dos.css">
    <script src="./js-dos.js"></script>

    <style>
        /* Ajustamos el contenedor para que ocupe un buen espacio */
        #jsdos-container {
            width: 100%;
            height: 500px;
            max-width: 800px;
            margin: 20px auto;
            border: 2px solid #333;
        }
    </style>
</head>
<body>

    <h1 style="text-align: center;">Jugando desde Bundle</h1>
    
    <div id="jsdos-container"></div>

    <script>
        // Inicializamos el emulador apuntando al ID de nuestro div
        const container = document.getElementById("jsdos-container");
        
        // Ejecutamos el archivo .jsdos
        Dos(container).run("fifa94.jsdos");
    </script>

</body>
</html>
