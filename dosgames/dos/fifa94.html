<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FIFA 94 - Solución Emulators.js</title>
    <link rel="stylesheet" href="https://v8.js-dos.com/latest/js-dos.css">
    <script src="https://v8.js-dos.com/latest/js-dos.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #jsdos { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="jsdos"></div>
    <script>
        // CONFIGURACIÓN PARA EVITAR EL ERROR DE PATHPREFIX
        // Forzamos a que busque emulators.js en el CDN oficial
        const jsdosOptions = {
            style: "none",
        };

        createDos(document.getElementById("jsdos"), jsdosOptions).then((runtime) => {
            // Importante: El punto y la barra ./ aseguran que busque en la carpeta actual de GitHub
            return runtime.run("./fifa94.zip");
        }).catch((err) => {
            console.error("Error:", err);
        });
    </script>
</body>
</html>
</body>
</html>
