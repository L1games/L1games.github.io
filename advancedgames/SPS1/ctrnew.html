<!DOCTYPE html>
<html>
    <head>
        <title>PS1 Folder Loader</title>
        <style>
            body, html {
                margin: 0; padding: 0; height: 100%; width: 100%;
                background-color: #1a1a1a; color: white; font-family: sans-serif;
            }
            #game { width: 100%; height: 100%; }
            .controls {
                position: absolute; top: 50%; left: 50%;
                transform: translate(-50%, -50%);
                text-align: center; z-index: 10;
            }
            input[type="file"] { display: none; }
            .upload-btn {
                background: #0064ff; padding: 15px 30px;
                border-radius: 5px; cursor: pointer; font-weight: bold;
                display: inline-block;
            }
        </style>
    </head>
    <body>

        <div id="setup" class="controls">
            <h2>Cargador de Carpeta PS1</h2>
            <label class="upload-btn">
                SELECCIONAR CARPETA DEL JUEGO
                <input type="file" id="rom_folder" webkitdirectory directory multiple>
            </label>
            <p>Selecciona la carpeta que contiene el .cue y los .bin</p>
        </div>

        <div id="game"></div>

        <script>
            const fileInput = document.getElementById('rom_folder');
            const setupDiv = document.getElementById('setup');

            fileInput.addEventListener('change', function(e) {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;

                // 1. Mapeamos todos los archivos de la carpeta en un objeto
                // Esto permite que el emulador encuentre los .bin cuando el .cue los pida
                const fileMap = {};
                files.forEach(file => {
                    fileMap[file.name] = URL.createObjectURL(file);
                });

                // 2. Buscamos el archivo "maestro" (.cue es el mejor para PS1)
                const mainFile = files.find(f => f.name.toLowerCase().endsWith('.cue')) || 
                                 files.find(f => f.name.toLowerCase().endsWith('.chd')) ||
                                 files.find(f => f.name.toLowerCase().endsWith('.iso'));

                if (mainFile) {
                    setupDiv.style.display = 'none';

                    // Configuración para EmulatorJS
                    window.EJS_patche = true;
                    window.EJS_player = "#game";
                    window.EJS_core = "psx"; 
                    window.EJS_biosUrl = "SCPH1001.BIN"; // Asegúrate de tener la BIOS en tu ruta
                    window.EJS_color = "#0064ff";
                    window.EJS_pathtodata = "/../../other/data"; 

                    // 3. Pasamos el archivo principal
                    window.EJS_gameUrl = fileMap[mainFile.name];

                    // 4. PASO CRUCIAL PARA VARIOS .BIN:
                    // Le damos al emulador acceso a todos los archivos de la carpeta
                    window.EJS_gameFiles = fileMap;

                    // Cargar el motor
                    const loader = document.createElement('script');
                    loader.src = "./scriptgame.js";
                    document.body.appendChild(loader);
                } else {
                    alert("No se encontró un archivo .cue o .iso dentro de la carpeta.");
                }
            });
        </script>
    </body>
</html>
