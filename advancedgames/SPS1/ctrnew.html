<!DOCTYPE html>
<html>
    <head>
        <title>PS1 Folder Loader</title>
        <style>
            body, html {
                margin: 0; padding: 0; height: 100%; width: 100%;
                background-color: #1a1a1a; color: white; font-family: sans-serif;
            }
            #game { width: 100%; height: 100%; }
            .controls {
                position: absolute; top: 50%; left: 50%;
                transform: translate(-50%, -50%);
                text-align: center; z-index: 10;
            }
            input[type="file"] { display: none; }
            .upload-btn {
                background: #0064ff; padding: 15px 30px;
                border-radius: 5px; cursor: pointer; font-weight: bold;
                display: inline-block;
            }
        </style>
    </head>
    <body>

        <div id="setup" class="controls">
            <h2>Cargador de Carpeta PS1</h2>
            <label class="upload-btn">
                SELECCIONAR CARPETA DEL JUEGO
                <input type="file" id="rom_folder" webkitdirectory directory multiple>
            </label>
            <p>Selecciona la carpeta que contiene el .cue y los .bin</p>
        </div>

        <div id="game"></div>

        <script>
            const fileInput = document.getElementById('rom_folder');
const setupDiv = document.getElementById('setup');

fileInput.addEventListener('change', function(e) {
    const files = Array.from(e.target.files);
    if (files.length === 0) return;

    // 1. CREAR EL SISTEMA DE ARCHIVOS VIRTUAL (VFS)
    // Mapeamos cada archivo de la carpeta para que el emulador "vea" todo el contenido
    const vfs = {};
    files.forEach(file => {
        // Usamos solo el nombre del archivo como clave para que el .cue lo encuentre fácil
        vfs[file.name] = URL.createObjectURL(file);
    });

    // 2. BUSCAR EL ARCHIVO PRINCIPAL (Prioridad: .cue > .chd > .pbp > .iso)
    const mainFile = files.find(f => f.name.toLowerCase().endsWith('.cue')) || 
                     files.find(f => f.name.toLowerCase().endsWith('.chd')) ||
                     files.find(f => f.name.toLowerCase().endsWith('.pbp')) ||
                     files.find(f => f.name.toLowerCase().endsWith('.iso')) ||
                     files.find(f => f.name.toLowerCase().endsWith('.bin'));

    if (mainFile) {
        setupDiv.style.display = 'none';

        // 3. CONFIGURACIÓN DEL EMULADOR (Específica para PSX)
        window.EJS_player = "#game";
        window.EJS_core = "psx"; // Core forzado a PlayStation 1
        
        // El emulador arranca con el archivo principal (ej: el .cue)
        window.EJS_gameUrl = vfs[mainFile.name];

        // LOGICA TIPO "GAME STUDIO":
        // Le pasamos el diccionario completo. Si el .cue dice "LEER TRACK2.BIN", 
        // el emulador lo buscará automáticamente en este objeto vfs.
        window.EJS_gameFiles = vfs;

        // Ajustes de rendimiento y compatibilidad
        window.EJS_patche = true;
        window.EJS_fullscreen = true;
        window.EJS_async = false; // Ayuda a que la carga de archivos locales sea más estable
        window.EJS_biosUrl = "SCPH1001.BIN"; // Asegúrate de que la BIOS esté en tu raíz
        window.EJS_pathtodata = "/../../other/data"; 
        window.EJS_color = "#0064ff";

        // 4. CARGAR EL MOTOR
        const loader = document.createElement('script');
        loader.src = "./scriptgame.js";
        document.body.appendChild(loader);

        console.log("Cargando juego de PS1:", mainFile.name);
        console.log("Archivos vinculados en la carpeta:", Object.keys(vfs).length);
    } else {
        alert("No se encontró un archivo ejecutable de PS1 (.cue, .chd, .iso, .bin) en la carpeta.");
    }
});
        </script>
    </body>
</html>
