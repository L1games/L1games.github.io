<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Station - IndexedDB Loader</title>
    <style>
        body { font-family: sans-serif; background: #222; color: #fff; text-align: center; }
        #game-container { width: 640px; height: 480px; margin: 20px auto; background: #000; border: 4px solid #444; }
        .status { margin: 10px; color: #00ff00; }
        button { padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        button:disabled { background: #555; }
    </style>
</head>
<body>

    <h1>Mi Consola Web</h1>
    <div id="status" class="status">Listo para iniciar</div>
    
    <button id="btn-start" onclick="controladorPrincipal()">Iniciar Juego</button>

    <div id="game-container">
        <div id="game"></div>
    </div>

    <script>
        const DB_NAME = "MiBibliotecaRetro";
        const STORE_NAME = "Juegos";
        const GAME_ID = "juego_drive_1"; // Identificador único en tu DB
        const PROXY = "https://corsproxy.io/?";
        const DRIVE_URL = PROXY + encodeURIComponent("https://drive.google.com/uc?export=download&id=1j8dR2oFyORnkqkUaF7Osb828Akc92KT4");

        // 1. Conectar a IndexedDB
        function conectarDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    e.target.result.createObjectStore(STORE_NAME);
                };
                request.onsuccess = () => resolve(request.result);
                request.onerror = () => reject("Error en IndexedDB");
            });
        }

        // 2. Buscar si el juego ya existe localmente
        async function obtenerJuegoLocal() {
            const db = await conectarDB();
            return new Promise((resolve) => {
                const tx = db.transaction(STORE_NAME, "readonly");
                const store = tx.objectStore(STORE_NAME);
                const request = store.get(GAME_ID);
                request.onsuccess = () => resolve(request.result);
            });
        }

        // 3. Descargar y guardar en IndexedDB
        async function descargarYGuardar() {
            document.getElementById('status').innerText = "Descargando de Drive (solo la primera vez)...";
            try {
                const respuesta = await fetch(DRIVE_URL);
                const blob = await respuesta.blob();
                
                const db = await conectarDB();
                const tx = db.transaction(STORE_NAME, "readwrite");
                tx.objectStore(STORE_NAME).put(blob, GAME_ID);
                
                return new Promise((resolve) => {
                    tx.oncomplete = () => resolve(blob);
                });
            } catch (err) {
                document.getElementById('status').innerText = "Error de conexión/CORS con Drive.";
                console.error(err);
            }
        }

        // 4. Lógica de inicio
        async function controladorPrincipal() {
            document.getElementById('btn-start').disabled = true;
            let archivoJuego = await obtenerJuegoLocal();

            if (!archivoJuego) {
                archivoJuego = await descargarYGuardar();
            }

            if (archivoJuego) {
                iniciarEmulatorJS(archivoJuego);
            }
        }

        // 5. Inyectar EmulatorJS
        function iniciarEmulatorJS(blob) {
            document.getElementById('status').innerText = "Cargando emulador...";
            
            // Creamos la URL desde el Blob de IndexedDB
            const urlLocal = URL.createObjectURL(blob);

            window.EJS_player = "#game";
            window.EJS_patche = true;
            window.EJS_biosUrl = "SCPH1001.BIN";
            window.EJS_core = "psx"; // Cambia esto según la consola (nes, gba, etc)
            window.EJS_gameUrl = urlLocal;
            window.EJS_color = "#0064ff";
            window.EJS_pathtodata = "/../../other/data"; // Asegúrate de que esta carpeta exista en tu server

            const script = document.createElement("script");
            script.src = "./scriptgame.js"; // El archivo loader.js de EmulatorJS
            document.head.appendChild(script);
            
            document.getElementById('status').innerText = "¡Jugando ahora!";
        }
    </script>

</body>
</html>
