<!DOCTYPE html>
<html>
    <head>
        <title>3DO Emulator Loader</title>
        <style>
            body, html {
                margin: 0; padding: 0; height: 100%; width: 100%;
                background-color: #1a1a1a; color: white; font-family: sans-serif;
            }
            #game { width: 100%; height: 100%; }
            
            /* Estilo para el selector de archivos */
            .controls {
                position: absolute; top: 50%; left: 50%;
                transform: translate(-50%, -50%);
                text-align: center; z-index: 10;
            }
            input[type="file"] { display: none; }
            .upload-btn {
                background: #0064ff; padding: 15px 30px;
                border-radius: 5px; cursor: pointer; font-weight: bold;
            }
        </style>
    </head>
    <body>

        <div id="setup" class="controls">
            <h2>Cargador de 3DO</h2>
            <label class="upload-btn">
                SELECCIONAR ROM (.iso, .bin, .zip)
                <input type="file" id="rom_file" accept=".iso,.bin,.zip,.chd">
            </label>
            <p>El juego se ejecutará localmente en tu navegador.</p>
            
        </div>

        <div id="game"></div>

        <script>
            const fileInput = document.getElementById('rom_file');
            const setupDiv = document.getElementById('setup');

            fileInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    // 1. Creamos una URL temporal para el archivo local
                    const gameBlob = URL.createObjectURL(file);
                    
                    // 2. Ocultamos el botón de carga
                    setupDiv.style.display = 'none';

                    // 3. Configuramos EmulatorJS
                    window.EJS_player = "#game";
                    window.EJS_core = "3do";
                    window.EJS_biosUrl = "panasonic.bin";
                    window.EJS_color = "#0064ff";
                    window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/"; 
                    window.EJS_gameUrl = gameBlob; // <--- Aquí se asigna el archivo elegido

                    // 4. Cargamos el script del emulador dinámicamente
                    const loader = document.createElement('script');
                    loader.src = "https://cdn.emulatorjs.org/stable/data/loader.js";
                    document.body.appendChild(loader);
                }
            });
        </script>
    </body>
</html>
