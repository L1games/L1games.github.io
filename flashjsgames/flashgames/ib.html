<!DOCTYPE html>
<html>
<head>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000;
    }
    .flasher, #container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
  </style>
</head>
<body>

<div class="flasher" id="container">
  <embed 
    src="./folder/ib.swf" 
    width="100%" 
    height="100%" 
    quality="high" 
    allowfullscreen="true" 
    type="application/x-shockwave-flash">
</div>

  <script src="../../ruffle/ruffle.js"></script>
  <script>
    document.addEventListener('keydown', function(event) {
        
        if (event.key.toLowerCase() === 'p') {
            
            window.location.href = '../../index.html'; 
        }
    });
</script>
</body>
</html>
