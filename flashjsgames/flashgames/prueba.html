<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <style>
    /* 1. Quitamos márgenes y obligamos al html y body a medir el total del viewport */
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden; 
      background-color: #000; /* Opcional: fondo negro por si el flash escala */
    }

    /* 2. El contenedor debe ser un bloque que llene el padre */
    .flasher {
      width: 100vw;
      height: 100vh;
      display: flex;
    }
    .flasher embed, 
    .flasher ruffle-player {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }
  </style>
</head>
<body>

  <div class="flasher">
    <embed src="./folder/youare.swf">
  </div>

  <script src="../../ruffle/ruffle.js"></script>

</body>
</html>
