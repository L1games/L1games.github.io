<!DOCTYPE html>
<html>
<head>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000;
    }
    .flasher, #container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #file-selector {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      padding: 15px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- El ID es importante para manipularlo con JS -->
  <input type="file" id="file-selector" accept=".swf">

  <div class="flasher" id="container"></div>

  <script src="./ruffle.js"></script>
  <script>
    const container = document.getElementById('container');
    const fileSelector = document.getElementById('file-selector');

    fileSelector.addEventListener('change', (event) => {
      const file = event.target.files[0];
      
      if (file) {
        // 1. Ocultamos el input inmediatamente
        fileSelector.style.display = 'none';

        // 2. Creamos la URL del archivo local
        const fileURL = URL.createObjectURL(file);

        // 3. Limpiamos y creamos el nuevo embed
        container.innerHTML = '';
        const embed = document.createElement('embed');
        embed.src = fileURL;
        embed.type = "application/x-shockwave-flash";
        embed.style.width = "100%";
        embed.style.height = "100%";

        container.appendChild(embed);
      }
    });
  </script>
  <script>
    document.addEventListener('keydown', function(event) {
        
        if (event.key.toLowerCase() === 'p') {
            
            window.location.href = '../index.html'; 
        }
    });
  </script>
</body>
</html>
